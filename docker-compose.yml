x-shared-env: &shared-env
  - DATABASE_URL=postgresql://turnstil:turnstil@db:5432/turnstil
  - DB_HOST=db
  - DB_NAME=turnstil
  - DB_USER=turnstil
  - DB_PASSWORD=turnstil
  - SECRET_KEY=dev-secret-change-in-production
  - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}

services:
  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      *shared-env
    depends_on:
      - db

  reminders:
    build: .
    command: python manage.py send_reminders --loop
    volumes:
      - .:/app
    environment:
      *shared-env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=turnstil
      - POSTGRES_USER=turnstil
      - POSTGRES_PASSWORD=turnstil
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
