{% extends "base.html" %}
{% block title %}Login — Turnstil{% endblock %}

{% block content %}
<div class="card fade-up" style="max-width: 420px;">
    <div class="page-header" style="margin-bottom: 20px;">
        <h2>Sign In</h2>
    </div>

    {% if error %}
        <div class="flash flash-error">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn btn-filled-lav" style="width: 100%; justify-content: center; margin-top: 20px;">Sign In</button>
    </form>

    <p style="margin-top: 16px; font-size: 13px; color: var(--text-2);">
        Don't have an account? <a href="{% url 'register' %}">Register</a>
    </p>
</div>
{% endblock %}
